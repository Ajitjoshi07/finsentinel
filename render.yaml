services:
  - type: web
    name: finsentinel-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      python -m app.ml.train
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finsentinel-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: web
    name: finsentinel-ui
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm ci --legacy-peer-deps && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://finsentinel-api.onrender.com/api/v1
      - key: NODE_VERSION
        value: 20.0.0

databases:
  - name: finsentinel-db
    region: oregon
    plan: free
    databaseName: finsentinel
    user: finsentinel
