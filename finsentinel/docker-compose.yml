version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: finsentinel-postgres
    environment:
      POSTGRES_DB: finsentinel
      POSTGRES_USER: finsentinel
      POSTGRES_PASSWORD: finsentinel_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finsentinel"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: finsentinel-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finsentinel-api
    environment:
      DATABASE_URL: postgresql://finsentinel:finsentinel_dev@postgres:5432/finsentinel
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ml_artifacts:/app/app/ml/artifacts

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finsentinel-ui
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  ml_artifacts:
